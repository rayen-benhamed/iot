<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGate - Smart Garage Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-radius: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-brand i {
            font-size: 28px;
            color: var(--primary-color);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-time {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Door Status Section */
        .status-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: center;
        }

        .status-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 700;
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--danger-color);
            margin-bottom: 30px;
            gap: 10px;
        }

        .status-circle i {
            font-size: 40px;
        }

        .status-circle.open {
            background: var(--success-color);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .status-circle.closed {
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4);
        }

        .controls {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-open {
            background-color: var(--success-color);
            color: white;
        }
        .btn-open:hover { background-color: #059669; }

        .btn-close {
            background-color: var(--danger-color);
            color: white;
        }
        .btn-close:hover { background-color: #dc2626; }

        /* History Section */
        .history-list {
            list-style: none;
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid #e5e7eb;
            gap: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #eff6ff;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .history-icon.open-icon { background: #d1fae5; color: var(--success-color); }
        .history-icon.close-icon { background: #fee2e2; color: var(--danger-color); }

        .history-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        .history-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* Widgets Info */
        .info-widgets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .widget {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .widget-icon {
            font-size: 24px;
            color: var(--primary-color);
        }

        .widget-data h4 {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .widget-data p {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="header">
            <div class="header-brand">
                <i class="fa-solid fa-warehouse"></i>
                <h1>AutoGate Dashboard</h1>
            </div>
            <div class="header-time">
                <i class="fa-regular fa-clock"></i>
                <span id="timeDisplay">--:--:--</span>
            </div>
        </header>

        <div class="grid-container">
            <!-- Left Column: Status & Control -->
            <div class="card">
                <div class="card-title">
                    <i class="fa-solid fa-sliders"></i> Centre de Contrôle
                </div>
                <div class="status-wrapper">
                    <div id="doorStatus" class="status-circle closed">
                        <i id="doorIcon" class="fa-solid fa-door-closed"></i>
                        <span id="doorText">FERMÉE</span>
                    </div>

                    <div class="controls">
                        <button class="btn btn-open" onclick="toggleDoor('open')">
                            <i class="fa-solid fa-unlock-keyhole"></i> Ouvrir
                        </button>
                        <button class="btn btn-close" onclick="toggleDoor('close')">
                            <i class="fa-solid fa-lock"></i> Fermer
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Stats & History -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Mini Widgets -->
                <div class="info-widgets">
                    <div class="widget">
                        <i class="fa-solid fa-temperature-half widget-icon"></i>
                        <div class="widget-data">
                            <h4>Température</h4>
                            <p>21°C</p>
                        </div>
                    </div>
                    <div class="widget">
                        <i class="fa-solid fa-wifi widget-icon"></i>
                        <div class="widget-data">
                            <h4>Connectivité</h4>
                            <p style="color: var(--success-color);">En ligne</p>
                        </div>
                    </div>
                </div>

                <!-- History -->
                <div class="card" style="flex-grow: 1;">
                    <div class="card-title">
                        <i class="fa-solid fa-list-ul"></i> Historique d'Accès
                    </div>
                    <ul class="history-list" id="historyList">
                        <li class="history-item">
                            <div class="history-icon close-icon"><i class="fa-solid fa-door-closed"></i></div>
                            <div class="history-content">
                                <span class="history-title">Fermeture Automatique</span>
                                <span class="history-meta">Système <span>Aujourd'hui, 08:30</span></span>
                            </div>
                        </li>
                        <li class="history-item">
                            <div class="history-icon open-icon"><i class="fa-solid fa-door-open"></i></div>
                            <div class="history-content">
                                <span class="history-title">Ouverture Manuelle</span>
                                <span class="history-meta">Utilisateur (Admin) <span>Aujourd'hui, 08:25</span></span>
                            </div>
                        </li>
                        <li class="history-item">
                            <div class="history-icon close-icon"><i class="fa-solid fa-door-closed"></i></div>
                            <div class="history-content">
                                <span class="history-title">Fermeture Manuelle</span>
                                <span class="history-meta">App Mobile <span>Hier, 19:45</span></span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Time updates
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').innerText = now.toLocaleTimeString('fr-FR');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Control logic
        function toggleDoor(action) {
            const statusEl = document.getElementById('doorStatus');
            const statusText = document.getElementById('doorText');
            const statusIcon = document.getElementById('doorIcon');
            const historyList = document.getElementById('historyList');
            const timeStr = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
            
            let actionTitle = '';
            let iconClass = '';
            let historyIconClass = '';
            let faIcon = '';

            if (action === 'open') {
                statusEl.className = 'status-circle open';
                statusText.innerText = 'OUVERTE';
                statusIcon.className = 'fa-solid fa-door-open';
                
                actionTitle = 'Ouverture Manuelle';
                iconClass = 'open-icon';
                faIcon = 'fa-door-open';
            } else {
                statusEl.className = 'status-circle closed';
                statusText.innerText = 'FERMÉE';
                statusIcon.className = 'fa-solid fa-door-closed';
                
                actionTitle = 'Fermeture Manuelle';
                iconClass = 'close-icon';
                faIcon = 'fa-door-closed';
            }

            // Generate history item
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <div class="history-icon ${iconClass}"><i class="fa-solid ${faIcon}"></i></div>
                <div class="history-content">
                    <span class="history-title">${actionTitle}</span>
                    <span class="history-meta">Dashboard Web <span>Aujourd'hui, ${timeStr}</span></span>
                </div>
            `;

            // Insert at the top
            historyList.insertBefore(li, historyList.firstChild);
            
            // Keep only latest 5
            if (historyList.children.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }
        }
    </script>
</body>
</html>
